name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 必须拉完整历史，git describe 才能工作

      # 生成和原项目一样的版本号格式：v1.3.0-61-ge2d4476
      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --always)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.1'

      - name: Install gh-ost
        run: |
          sudo wget -O gh-ost.tar.gz https://github.com/github/gh-ost/releases/download/v1.1.0/gh-ost-binary-linux-20200828140552.tar.gz
          sudo tar -zxvf gh-ost.tar.gz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/gh-ost
          sudo cp /usr/local/bin/gh-ost /bin/gh-ost

      # 编译 macOS
      - name: Build macOS
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o bin/macos-goInception tidb-server/main.go
          tar -czf goInception-macOS-${{ steps.version.outputs.VERSION }}.tar.gz -o bin/macos-goInception

      # 编译 linux
      - name: Build linux
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o bin/goInception tidb-server/main.go
          tar -czf goInception-linux-${{ steps.version.outputs.VERSION }}.tar.gz bin/goInception

      # 上传到 Release Assets（没有 tag 时自动创建一个名为 latest 的 Release）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Latest Build (${{ steps.version.outputs.VERSION }})"
          prerelease: false
          files: |
            goInception-linux-${{ steps.version.outputs.VERSION }}.tar.gz
            goInception-macOS-${{ steps.version.outputs.VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 此时 goInception（linux/amd64）已经编译好，直接复用
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile 内容见下方，使用原镜像替换二进制
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/goinception:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/goinception:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
