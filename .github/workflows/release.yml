name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.1'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 编译 linux/amd64 静态二进制
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o goInception \
            tidb-server/main.go

      # 打包：二进制 + 默认配置文件
      - name: Package
        run: |
          mkdir -p release
          cp goInception release/
          cp config/config.toml.default release/config.toml
          cp bin/pt-online-schema-change release/ 2>/dev/null || true
          tar -czf goInception-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz -C release .

      # 创建 Release 并上传到 Assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: goInception-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

用之前记得检查一个权限设置：
```
仓库 Settings
→ Actions
→ General
→ Workflow permissions
→ 选 "Read and write permissions"
